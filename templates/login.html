<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SmartAttendance | Login</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { min-height: 100vh; background: linear-gradient(135deg,#0f172a 0%,#1e3a5f 100%); display: flex; align-items: center; justify-content: center; font-family: Arial,sans-serif; }
    .login-card { background: #fff; border-radius: 20px; padding: 2.5rem 2rem; width: 100%; max-width: 420px; box-shadow: 0 20px 60px rgba(0,0,0,.3); }
    .brand { text-align: center; margin-bottom: 2rem; }
    .brand .icon { width: 64px; height: 64px; background: #3b82f6; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; color: #fff; margin: 0 auto 1rem; }
    .brand h1 { font-size: 1.6rem; font-weight: 700; color: #0f172a; }
    .brand p { color: #64748b; font-size: 0.9rem; margin-top: 4px; }
    .form-group { margin-bottom: 1.2rem; }
    .form-group label { display: block; font-size: 0.85rem; font-weight: 600; color: #374151; margin-bottom: 6px; }
    .input-wrap { position: relative; }
    .input-wrap i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #9ca3af; }
    .input-wrap input { width: 100%; padding: .75rem .75rem .75rem 2.5rem; border: 1px solid #d1d5db; border-radius: 10px; font-size: 0.95rem; }
    .input-wrap input:focus { outline: none; border-color: #3b82f6; }
    .btn-login { width: 100%; padding: .85rem; background: #3b82f6; color: #fff; border: none; border-radius: 10px; font-size: 1rem; font-weight: 700; cursor: pointer; margin-top: .5rem; transition: .2s; }
    .btn-login:hover { background: #2563eb; }
    .flash-error { background: #fee2e2; color: #991b1b; padding: .7rem 1rem; border-radius: 8px; margin-bottom: 1rem; font-size: .88rem; }
    .hint { text-align: center; margin-top: 1.2rem; font-size: .82rem; color: #94a3b8; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="brand">
      <div class="icon"><i class="fas fa-shield-halved"></i></div>
      <h1>SmartAttendance</h1>
      <p>AI-Powered Biometric Attendance System</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, msg in messages %}
        <div class="flash-{{ category }}"><i class="fas fa-exclamation-circle"></i> {{ msg }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST" action="{{ url_for('login') }}">
      <div class="form-group">
        <label>Email Address</label>
        <div class="input-wrap">
          <i class="fas fa-envelope"></i>
          <input type="email" name="email" placeholder="admin@smart.edu" required/>
        </div>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="input-wrap">
          <i class="fas fa-lock"></i>
          <input type="password" name="password" placeholder="••••••••" required/>
        </div>
      </div>
      <button type="submit" class="btn-login"><i class="fas fa-sign-in-alt"></i> Sign In</button>
    </form>
    <p class="hint">Default: admin@smart.edu / admin123</p>
  </div>
</body>
</html>
